version: "3.9"

services:

  backend:
    build: ./backend
    container_name: backend
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - MONGO_URI=mongodb://mongo:27017/
      - REDIS_HOST=redis
    depends_on:
      - mongo
      - redis
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    stdin_open: true
    tty: true
    restart: always

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    restart: always

  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  # ✅ ADD CELERY HERE (INSIDE services)
  celery:
    build: ./backend
    container_name: celery
    command: celery -A backend worker -l info
    volumes:
      - ./backend:/app
    environment:
      - MONGO_URI=mongodb://mongo:27017/
      - REDIS_HOST=redis
    depends_on:
      - redis
      - backend
    restart: always

volumes:
  mongo_data: